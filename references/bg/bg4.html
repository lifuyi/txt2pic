<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国风 SVG 背景图集 - 山与柳主题</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', 'SimSun', serif; }
        .writing-vertical { writing-mode: vertical-rl; }
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#f4f1ea] text-gray-800 py-12 px-4 sm:px-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-widest text-[#2c3e50]">春山柳色 SVG 集</h1>
            <p class="text-gray-600 text-lg">适配 Instagram Story (1080x1920)。<br>融合了参考图中的山脉层叠与柳丝垂下的意境设计。</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            
            <!-- 卡片 1：春山如黛 (Mountains) -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-[#dcd6c8] flex flex-col hover:scale-[1.02] transition-transform duration-300">
                <div class="relative w-full aspect-[9/16] bg-[#f9f7f2]">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f9f7f2"/>
                            <!-- 远山 1 -->
                            <path d="M 0 1300 C 200 1150, 400 1350, 600 1150 S 900 1300, 1080 1100 L 1080 1920 L 0 1920 Z" fill="#c1d5d0" opacity="0.5"/>
                            <!-- 远山 2 -->
                            <path d="M 0 1500 C 300 1300, 600 1600, 1080 1350 L 1080 1920 L 0 1920 Z" fill="#8bb3a4" opacity="0.6"/>
                            <!-- 主山 -->
                            <path d="M -100 1920 L 300 1400 L 700 1750 L 1000 1450 L 1200 1920 Z" fill="#418c81" opacity="0.9"/>
                            <!-- 飞鸟 -->
                            <path d="M 300 400 Q 315 385, 330 400 M 330 400 Q 345 385, 360 400" stroke="#333" stroke-width="3" fill="none" opacity="0.6"/>
                            <path d="M 400 450 Q 410 440, 420 450 M 420 450 Q 430 440, 440 450" stroke="#333" stroke-width="2" fill="none" opacity="0.5"/>
                        </svg>
                    </div>
                    <div class="absolute top-24 right-12 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#2d5a52] tracking-widest">春山如黛</h3>
                        <p class="text-[#5b8c85] mt-6 tracking-widest text-lg">青山横北郭<br>白水绕东城</p>
                    </div>
                </div>
                <div class="p-5 flex flex-col items-center bg-[#faf9f6]">
                    <button onclick="copySVG(this)" class="w-full py-2.5 bg-transparent border-2 border-[#8bb3a4] text-[#418c81] font-bold rounded-lg hover:bg-[#8bb3a4] hover:text-white transition-all text-sm uppercase tracking-wider">复制代码</button>
                </div>
            </div>

            <!-- 卡片 2：柳丝依依 (Willow) -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-[#dcd6c8] flex flex-col hover:scale-[1.02] transition-transform duration-300">
                <div class="relative w-full aspect-[9/16] bg-[#f2f8f2]">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f2f8f2"/>
                            <!-- 顶部柳枝 -->
                            <g stroke="#7cb342" stroke-width="2" fill="none" opacity="0.8">
                                <path d="M 100 0 C 150 400, 100 800, 120 1300" />
                                <path d="M 150 0 C 220 500, 180 900, 200 1450" />
                                <path d="M 400 0 C 450 300, 420 600, 440 1000" />
                                <path d="M 700 0 C 650 400, 680 800, 660 1200" />
                            </g>
                            <!-- 柳叶细节 -->
                            <ellipse cx="120" cy="600" rx="4" ry="15" fill="#4caf50" transform="rotate(15, 120, 600)"/>
                            <ellipse cx="205" cy="900" rx="3" ry="12" fill="#4caf50" transform="rotate(-10, 205, 900)"/>
                            <ellipse cx="438" cy="500" rx="3" ry="12" fill="#8bc34a" transform="rotate(5, 438, 500)"/>
                            <ellipse cx="665" cy="850" rx="4" ry="14" fill="#689f38" transform="rotate(-5, 665, 850)"/>
                            <!-- 飞燕 (剪影) -->
                            <path d="M 800 1400 L 840 1390 L 830 1410 L 800 1400 M 830 1410 L 860 1405 L 845 1415 L 860 1425 L 830 1420" fill="#333"/>
                        </svg>
                    </div>
                    <div class="absolute bottom-32 left-12 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#388e3c] tracking-widest">柳丝依依</h3>
                        <p class="text-[#689f38] mt-6 tracking-widest text-lg">昔我往矣<br>杨柳依依</p>
                    </div>
                </div>
                <div class="p-5 flex flex-col items-center bg-[#faf9f6]">
                    <button onclick="copySVG(this)" class="w-full py-2.5 bg-transparent border-2 border-[#81c784] text-[#2e7d32] font-bold rounded-lg hover:bg-[#81c784] hover:text-white transition-all text-sm uppercase tracking-wider">复制代码</button>
                </div>
            </div>

            <!-- 卡片 3：山水烟雨 (Mountain & Willow Mix) -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-[#dcd6c8] flex flex-col hover:scale-[1.02] transition-transform duration-300">
                <div class="relative w-full aspect-[9/16] bg-[#f8f9fa]">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f8f9fa"/>
                            <!-- 烟雨蒙蒙的远山 -->
                            <path d="M 0 1400 Q 540 1200, 1080 1400 L 1080 1920 L 0 1920 Z" fill="#cfd8dc" opacity="0.4"/>
                            <!-- 柳树主干 (右侧) -->
                            <path d="M 1080 400 Q 900 450, 950 1000" stroke="#546e7a" stroke-width="12" fill="none" stroke-linecap="round"/>
                            <!-- 下垂的细柳 -->
                            <g stroke="#90a4ae" stroke-width="1.5" fill="none">
                                <path d="M 950 600 Q 800 1000, 850 1600" />
                                <path d="M 920 650 Q 750 1100, 800 1700" />
                                <path d="M 1000 550 Q 850 900, 900 1500" />
                            </g>
                            <!-- 水面波纹 -->
                            <ellipse cx="540" cy="1700" rx="400" ry="40" stroke="#eceff1" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div class="absolute top-48 left-16 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#455a64] tracking-widest text-shadow">江南烟雨</h3>
                        <p class="text-[#78909c] mt-8 tracking-widest text-lg">沾衣欲湿杏花雨<br>吹面不寒杨柳风</p>
                    </div>
                </div>
                <div class="p-5 flex flex-col items-center bg-[#faf9f6]">
                    <button onclick="copySVG(this)" class="w-full py-2.5 bg-transparent border-2 border-[#90a4ae] text-[#455a64] font-bold rounded-lg hover:bg-[#90a4ae] hover:text-white transition-all text-sm uppercase tracking-wider">复制代码</button>
                </div>
            </div>

            <!-- 卡片 4：翠峰迎晖 (Bright Spring) -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-[#dcd6c8] flex flex-col hover:scale-[1.02] transition-transform duration-300">
                <div class="relative w-full aspect-[9/16] bg-[#fffdf0]">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#fffdf0"/>
                            <!-- 暖阳 -->
                            <circle cx="200" cy="300" r="150" fill="#fff9c4" opacity="0.6"/>
                            <!-- 翠绿层山 -->
                            <path d="M 0 1600 L 400 1300 L 800 1550 L 1080 1400 L 1080 1920 L 0 1920 Z" fill="#81c784" opacity="0.7"/>
                            <path d="M 0 1800 L 300 1550 L 600 1750 L 900 1600 L 1080 1750 L 1080 1920 L 0 1920 Z" fill="#4caf50" opacity="0.8"/>
                            <!-- 侧边伸出的柳枝 -->
                            <path d="M 0 200 C 200 150, 400 300, 350 700" stroke="#33691e" stroke-width="6" fill="none" opacity="0.6"/>
                            <g fill="#aed581">
                                <circle cx="350" cy="700" r="8"/>
                                <circle cx="330" cy="650" r="6"/>
                                <circle cx="300" cy="550" r="5"/>
                            </g>
                        </svg>
                    </div>
                    <div class="absolute top-64 right-16 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#1b5e20] tracking-widest">春晖大地</h3>
                        <p class="text-[#388e3c] mt-6 tracking-widest text-lg">草长莺飞二月天<br>拂堤杨柳醉春烟</p>
                    </div>
                </div>
                <div class="p-5 flex flex-col items-center bg-[#faf9f6]">
                    <button onclick="copySVG(this)" class="w-full py-2.5 bg-transparent border-2 border-[#aed581] text-[#33691e] font-bold rounded-lg hover:bg-[#aed581] hover:text-white transition-all text-sm uppercase tracking-wider">复制代码</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function copySVG(btn) {
            const card = btn.closest('.bg-white');
            const svgContainer = card.querySelector('.svg-container');
            const svgHTML = svgContainer.innerHTML.trim();
            
            const textarea = document.createElement('textarea');
            textarea.value = svgHTML;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                const originalText = btn.innerHTML;
                btn.innerHTML = '已复制到剪贴板';
                btn.classList.add('bg-gray-800', 'text-white', 'border-gray-800');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-gray-800', 'text-white', 'border-gray-800');
                }, 2000);
            } catch (err) {
                console.error('复制失败', err);
            }
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
