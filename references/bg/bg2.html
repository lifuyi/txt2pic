<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国风 SVG 背景图集 - 春天系列</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', 'SimSun', serif; }
        .writing-vertical { writing-mode: vertical-rl; }
        /* 隐藏滚动条让卡片更干净 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-[#f2efe9] text-gray-800 py-12 px-4 sm:px-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-widest text-[#362923]">春日中国风 SVG 集</h1>
            <p class="text-gray-600 text-lg">比例 1080×1920 (9:16)，适配 Instagram Story / 手机壁纸。<br>点击「复制代码」即可获取纯净 SVG 代码。</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 lg:gap-8">
            
            <!-- 卡片 1：春江水暖 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#fdfcf0"/>
                            <!-- 水波纹 -->
                            <ellipse cx="540" cy="1600" rx="600" ry="150" fill="#e0f2f1" opacity="0.5"/>
                            <ellipse cx="300" cy="1700" rx="400" ry="80" fill="#b2dfdb" opacity="0.3"/>
                            
                            <!-- 桃花枝 -->
                            <path d="M 0 400 C 200 350, 400 500, 600 300" stroke="#5d4037" stroke-width="8" fill="none"/>
                            <circle cx="200" cy="380" r="15" fill="#ffab91"/>
                            <circle cx="220" cy="395" r="12" fill="#ffab91"/>
                            <circle cx="450" cy="420" r="18" fill="#ff8a65"/>
                            <circle cx="580" cy="320" r="14" fill="#ffab91"/>
                            
                            <!-- 鸭子简影 -->
                            <g transform="translate(400, 1550)">
                                <path d="M0,0 C20,-20 60,-20 80,0 C100,20 80,50 40,50 C0,50 -20,20 0,0 Z" fill="#455a64"/>
                                <circle cx="70" cy="10" r="5" fill="#fdd835"/>
                            </g>

                            <!-- 装饰 -->
                            <text x="50" y="100" font-family="serif" font-size="24" fill="#8d6e63" opacity="0.4">SPRINGTIME</text>
                        </svg>
                    </div>
                    <div class="absolute top-20 right-10 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#d84315] tracking-widest">春江水暖</h3>
                        <p class="text-[#5d4037] mt-4 tracking-widest">竹外桃花三两枝<br>春江水暖鸭先知</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6]">
                    <h2 class="font-bold text-[#362923]">春江桃花</h2>
                    <button onclick="copySVG(this)" class="mt-3 w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors text-sm font-medium">复制代码</button>
                </div>
            </div>

            <!-- 卡片 2：绿柳垂丝 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f1f8e9"/>
                            <!-- 柳条 -->
                            <g stroke="#81c784" stroke-width="2" fill="none">
                                <path d="M 100 0 Q 150 400, 120 900" />
                                <path d="M 300 0 Q 250 500, 320 1100" />
                                <path d="M 600 0 Q 650 300, 580 850" />
                                <path d="M 900 0 Q 850 450, 920 1000" />
                            </g>
                            <!-- 柳叶细节 -->
                            <ellipse cx="125" cy="400" rx="3" ry="12" fill="#4caf50" transform="rotate(20, 125, 400)"/>
                            <ellipse cx="310" cy="600" rx="3" ry="15" fill="#4caf50" transform="rotate(-15, 310, 600)"/>
                            <ellipse cx="590" cy="500" rx="3" ry="12" fill="#4caf50" transform="rotate(10, 590, 500)"/>
                            
                            <!-- 飞燕 -->
                            <g transform="translate(500, 1200) rotate(-10)">
                                <path d="M0,0 L40,-10 L30,20 L0,0 Z" fill="#263238"/> <!-- 翅膀 -->
                                <path d="M0,0 L40,10 L30,-20 L0,0 Z" fill="#263238"/> <!-- 翅膀 -->
                                <path d="M-10,0 L10,-5 L20,0 L10,5 Z" fill="#263238"/> <!-- 身体 -->
                                <path d="M20,0 L45,-8 L35,0 L45,8 Z" fill="#263238"/> <!-- 剪刀尾 -->
                            </g>
                        </svg>
                    </div>
                    <div class="absolute bottom-24 left-10 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#2e7d32] tracking-widest">万条垂下</h3>
                        <p class="text-[#33691e] mt-4 tracking-widest text-lg">碧玉妆成一树高<br>万条垂下绿丝绦</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6]">
                    <h2 class="font-bold text-[#362923]">柳丝飞燕</h2>
                    <button onclick="copySVG(this)" class="mt-3 w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors text-sm font-medium">复制代码</button>
                </div>
            </div>

            <!-- 卡片 3：梨花带雨 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#fafafa"/>
                            <!-- 雨丝 -->
                            <g stroke="#cfd8dc" stroke-width="1">
                                <line x1="100" y1="0" x2="80" y2="1920" />
                                <line x1="300" y1="0" x2="280" y2="1920" />
                                <line x1="500" y1="0" x2="480" y2="1920" />
                                <line x1="700" y1="0" x2="680" y2="1920" />
                                <line x1="900" y1="0" x2="880" y2="1920" />
                            </g>
                            <!-- 梨花枝 -->
                            <path d="M 1080 1400 Q 700 1300, 400 1500" stroke="#455a64" stroke-width="6" fill="none"/>
                            <!-- 梨花 (白色) -->
                            <g transform="translate(500, 1420)">
                                <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#eceff1"/>
                                <circle cx="0" cy="0" r="5" fill="#fff59d"/>
                                <path d="M-20,-20 L20,20 M-20,20 L20,-20" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
                            </g>
                            <g transform="translate(750, 1330) scale(0.8)">
                                <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#eceff1"/>
                                <circle cx="0" cy="0" r="5" fill="#fff59d"/>
                            </g>
                        </svg>
                    </div>
                    <div class="absolute top-32 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#546e7a] tracking-[0.5em]">梨花带雨</h3>
                        <p class="text-[#78909c] mt-8 tracking-widest text-lg">玉容寂寞泪阑干<br>梨花一枝春带雨</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6]">
                    <h2 class="font-bold text-[#362923]">微雨梨花</h2>
                    <button onclick="copySVG(this)" class="mt-3 w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors text-sm font-medium">复制代码</button>
                </div>
            </div>

            <!-- 卡片 4：春山叠翠 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f1fdf1"/>
                            <!-- 远山 (浅绿) -->
                            <path d="M 0 1500 L 300 1200 L 600 1450 L 900 1100 L 1080 1300 L 1080 1920 L 0 1920 Z" fill="#c8e6c9" opacity="0.6"/>
                            <!-- 近山 (翠绿) -->
                            <path d="M 0 1700 L 400 1400 L 800 1650 L 1080 1500 L 1080 1920 L 0 1920 Z" fill="#81c784" opacity="0.8"/>
                            <!-- 装饰云 -->
                            <path d="M 200 1000 Q 300 950, 400 1000 T 600 1000" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.7"/>
                            <!-- 太阳 (淡黄) -->
                            <circle cx="200" cy="300" r="80" fill="#fff9c4" opacity="0.8"/>
                        </svg>
                    </div>
                    <div class="absolute top-48 right-12 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl font-bold text-[#2e7d32] tracking-widest">春山如笑</h3>
                        <p class="text-[#4caf50] mt-6 tracking-widest text-lg">草长莺飞二月天<br>拂堤杨柳醉春烟</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6]">
                    <h2 class="font-bold text-[#362923]">春山叠翠</h2>
                    <button onclick="copySVG(this)" class="mt-3 w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors text-sm font-medium">复制代码</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function copySVG(btn) {
            const card = btn.closest('.bg-white');
            const svgContainer = card.querySelector('.svg-container');
            const svgHTML = svgContainer.innerHTML.trim();
            const textarea = document.createElement('textarea');
            textarea.value = svgHTML;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const originalText = btn.innerHTML;
                btn.innerHTML = '已复制！';
                btn.classList.add('bg-[#8bb3a4]', 'border-[#8bb3a4]', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-[#8bb3a4]', 'border-[#8bb3a4]', 'text-white');
                }, 2000);
            } catch (err) {
                console.error('复制失败');
            }
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
