<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国风 SVG 背景图集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', 'SimSun', serif; }
        .writing-vertical { writing-mode: vertical-rl; }
        /* 隐藏滚动条让卡片更干净 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-[#f2efe9] text-gray-800 py-12 px-4 sm:px-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-widest text-[#362923]">中国风 SVG 背景集 (IG竖版)</h1>
            <p class="text-gray-600 text-lg">已更新为 1080×1920 (9:16) 比例，完美适配 Instagram Story / Reels / 手机海报。<br>点击下方卡片中的「复制代码」即可直接在您的项目中使用。</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 lg:gap-8">
            
            <!-- 卡片 1：青绿山水 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <!-- SVG 容器（复制的内容仅限此处） -->
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f4f1e8"/>
                            <circle cx="800" cy="350" r="140" fill="#d95e4e" opacity="0.85"/>
                            
                            <!-- 远山 -->
                            <path d="M 0 1300 C 300 1200, 600 1350, 1080 1100 L 1080 1920 L 0 1920 Z" fill="#8bb3a4" opacity="0.6"/>
                            <!-- 中景山 -->
                            <path d="M 0 1500 C 400 1300, 700 1600, 1080 1350 L 1080 1920 L 0 1920 Z" fill="#418c81" opacity="0.8"/>
                            <!-- 近景山 -->
                            <path d="M 0 1750 C 300 1600, 600 1800, 1080 1550 L 1080 1920 L 0 1920 Z" fill="#295f68"/>
                            
                            <!-- 云雾基底 -->
                            <path d="M 0 1650 C 400 1550, 800 1700, 1080 1600 L 1080 1920 L 0 1920 Z" fill="#ffffff" opacity="0.4"/>

                            <!-- 飞鸟 -->
                            <g fill="#333" transform="translate(650, 280) scale(0.9)">
                                <path d="M0,15 C15,0 30,15 30,15 C30,15 15,7.5 0,15 Z" />
                                <path d="M30,15 C45,0 60,15 60,15 C60,15 45,7.5 30,15 Z" />
                            </g>
                            <g fill="#333" transform="translate(550, 350) scale(0.6)">
                                <path d="M0,15 C15,0 30,15 30,15 C30,15 15,7.5 0,15 Z" />
                                <path d="M30,15 C45,0 60,15 60,15 C60,15 45,7.5 30,15 Z" />
                            </g>
                        </svg>
                    </div>
                    <!-- 演示文字遮罩层（不被复制） -->
                    <div class="absolute top-12 right-8 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl lg:text-4xl mb-6 font-bold text-[#295f68] tracking-widest">只此青绿</h3>
                        <p class="text-[#418c81] tracking-widest text-base lg:text-lg font-bold">江山如画<br>一时多少豪杰</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6] gap-3">
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-[#362923]">青绿山水</h2>
                        <p class="text-xs text-gray-500">顶部留白广阔</p>
                    </div>
                    <button onclick="copySVG(this)" class="w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors duration-200 text-sm">复制代码</button>
                </div>
            </div>

            <!-- 卡片 2：傲骨寒梅 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <defs>
                                <g id="flower">
                                    <circle cx="0" cy="-6" r="5" fill="#c43f45"/>
                                    <circle cx="6" cy="-2" r="5" fill="#c43f45"/>
                                    <circle cx="4" cy="5" r="5" fill="#c43f45"/>
                                    <circle cx="-4" cy="5" r="5" fill="#c43f45"/>
                                    <circle cx="-6" cy="-2" r="5" fill="#c43f45"/>
                                    <circle cx="0" cy="0" r="2.5" fill="#f2c86b"/>
                                </g>
                            </defs>
                            <rect width="1080" height="1920" fill="#faf7f2"/>
                            
                            <!-- 背景圆月/光晕 -->
                            <circle cx="400" cy="800" r="320" fill="#e8ded1" opacity="0.3"/>
                            
                            <!-- 枝干 -->
                            <path d="M 1080 0 C 800 200, 700 600, 400 900 C 200 1100, 150 1400, -50 1600" stroke="#362923" stroke-width="12" stroke-linecap="round" fill="none"/>
                            <path d="M 850 180 C 700 400, 550 500, 450 800" stroke="#362923" stroke-width="8" stroke-linecap="round" fill="none"/>
                            <path d="M 400 900 C 300 800, 250 750, 100 700" stroke="#362923" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <path d="M 250 1250 C 200 1350, 100 1450, 50 1400" stroke="#362923" stroke-width="4" stroke-linecap="round" fill="none"/>
                            
                            <!-- 花朵 (使用明确的 translate 和 scale放大) -->
                            <use href="#flower" transform="translate(850, 180) scale(2.5)" />
                            <use href="#flower" transform="translate(700, 400) scale(2.2)" />
                            <use href="#flower" transform="translate(450, 800) scale(2.8)" />
                            <use href="#flower" transform="translate(400, 900) scale(2)" />
                            <use href="#flower" transform="translate(250, 1250) scale(2.5)" />
                            <use href="#flower" transform="translate(150, 1400) scale(2)" />
                            <use href="#flower" transform="translate(100, 700) scale(1.8)" />
                            <use href="#flower" transform="translate(50, 1400) scale(1.5)" />
                            <use href="#flower" transform="translate(600, 680) scale(2.3)" />
                            <use href="#flower" transform="translate(180, 1050) scale(2.1)" />
                        </svg>
                    </div>
                    <!-- 演示竖向文字 -->
                    <div class="absolute bottom-16 left-8 flex flex-col items-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl lg:text-4xl mb-6 font-bold tracking-widest text-[#c43f45]">清平调</h3>
                        <p class="text-[#362923] text-base lg:text-lg tracking-widest leading-loose">云想衣裳花想容<br>春风拂槛露华浓</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6] gap-3">
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-[#362923]">傲骨寒梅</h2>
                        <p class="text-xs text-gray-500">倾泻而下的纵深感</p>
                    </div>
                    <button onclick="copySVG(this)" class="w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors duration-200 text-sm">复制代码</button>
                </div>
            </div>

            <!-- 卡片 3：古韵回纹 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#f8f4e6"/>
                            
                            <!-- 外框 -->
                            <rect x="50" y="50" width="980" height="1820" stroke="#a68a5c" stroke-width="4" fill="none"/>
                            <rect x="65" y="65" width="950" height="1790" stroke="#a68a5c" stroke-width="2" fill="none"/>
                            <rect x="90" y="90" width="900" height="1740" stroke="#a68a5c" stroke-width="1" fill="none" opacity="0.5"/>
                            
                            <!-- 四角圆环装饰 -->
                            <circle cx="65" cy="65" r="30" fill="#f8f4e6" stroke="#a68a5c" stroke-width="2"/>
                            <circle cx="65" cy="65" r="18" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            
                            <circle cx="1015" cy="65" r="30" fill="#f8f4e6" stroke="#a68a5c" stroke-width="2"/>
                            <circle cx="1015" cy="65" r="18" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            
                            <circle cx="65" cy="1855" r="30" fill="#f8f4e6" stroke="#a68a5c" stroke-width="2"/>
                            <circle cx="65" cy="1855" r="18" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            
                            <circle cx="1015" cy="1855" r="30" fill="#f8f4e6" stroke="#a68a5c" stroke-width="2"/>
                            <circle cx="1015" cy="1855" r="18" fill="none" stroke="#a68a5c" stroke-width="4"/>

                            <!-- 上下居中装饰 -->
                            <path d="M 480 50 L 510 20 L 570 20 L 600 50" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            <path d="M 495 65 L 515 45 L 565 45 L 585 65" fill="none" stroke="#a68a5c" stroke-width="2"/>
                            
                            <path d="M 480 1870 L 510 1900 L 570 1900 L 600 1870" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            <path d="M 495 1855 L 515 1875 L 565 1875 L 585 1855" fill="none" stroke="#a68a5c" stroke-width="2"/>
                            
                            <!-- 左右居中装饰 -->
                            <path d="M 50 900 L 20 930 L 20 990 L 50 1020" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            <path d="M 65 915 L 45 935 L 45 985 L 65 1005" fill="none" stroke="#a68a5c" stroke-width="2"/>
                            
                            <path d="M 1030 900 L 1060 930 L 1060 990 L 1030 1020" fill="none" stroke="#a68a5c" stroke-width="4"/>
                            <path d="M 1015 915 L 1035 935 L 1035 985 L 1015 1005" fill="none" stroke="#a68a5c" stroke-width="2"/>
                        </svg>
                    </div>
                    <!-- 演示文字竖版居中 -->
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl lg:text-4xl mb-6 font-bold text-[#5c4a3d] tracking-[0.3em]">金榜题名</h3>
                        <p class="text-[#8c7a6d] tracking-widest text-base lg:text-lg leading-loose">长风破浪会有时<br>直挂云帆济沧海</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6] gap-3">
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-[#362923]">古韵边框</h2>
                        <p class="text-xs text-gray-500">经典对称，适合居中</p>
                    </div>
                    <button onclick="copySVG(this)" class="w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors duration-200 text-sm">复制代码</button>
                </div>
            </div>

            <!-- 卡片 4：太极锦鲤 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-[#e5e0d8] flex flex-col hover:shadow-2xl transition-shadow duration-300">
                <div class="relative w-full aspect-[9/16] bg-gray-50">
                    <div class="svg-container absolute inset-0 w-full h-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
                            <rect width="1080" height="1920" fill="#fcfbf9"/>
                            
                            <!-- 中心水波纹 -->
                            <circle cx="540" cy="960" r="300" stroke="#ebe6dd" stroke-width="2" fill="none"/>
                            <circle cx="540" cy="960" r="420" stroke="#f2efe9" stroke-width="2" fill="none"/>
                            <circle cx="540" cy="960" r="540" stroke="#f5f2ed" stroke-width="2" fill="none"/>

                            <!-- 红锦鲤 (右上) -->
                            <g transform="translate(750, 600) rotate(135) scale(1.6)">
                                <!-- 身体 -->
                                <path d="M0,0 C30,20 20,80 0,120 C-20,80 -30,20 0,0 Z" fill="#cf4a40"/>
                                <!-- 侧鳍 -->
                                <path d="M-18,40 C-35,30 -45,50 -20,60 Z" fill="#cf4a40"/>
                                <path d="M18,40 C35,30 45,50 20,60 Z" fill="#cf4a40"/>
                                <!-- 尾巴 -->
                                <path d="M0,110 C-20,130 15,160 0,180 C10,150 -20,130 0,110 Z" fill="#cf4a40"/>
                                <!-- 眼睛 -->
                                <circle cx="-6" cy="15" r="3" fill="#000"/>
                                <circle cx="-6" cy="15" r="1.5" fill="#fff"/>
                                <circle cx="6" cy="15" r="3" fill="#000"/>
                                <circle cx="6" cy="15" r="1.5" fill="#fff"/>
                            </g>
                            
                            <!-- 黑锦鲤 (左下) -->
                            <g transform="translate(330, 1320) rotate(-45) scale(1.6)">
                                <!-- 身体 -->
                                <path d="M0,0 C30,20 20,80 0,120 C-20,80 -30,20 0,0 Z" fill="#333333"/>
                                <!-- 侧鳍 -->
                                <path d="M-18,40 C-35,30 -45,50 -20,60 Z" fill="#333333"/>
                                <path d="M18,40 C35,30 45,50 20,60 Z" fill="#333333"/>
                                <!-- 尾巴 -->
                                <path d="M0,110 C-20,130 15,160 0,180 C10,150 -20,130 0,110 Z" fill="#333333"/>
                                <!-- 眼睛 -->
                                <circle cx="-6" cy="15" r="3" fill="#fff"/>
                                <circle cx="-6" cy="15" r="1.5" fill="#000"/>
                                <circle cx="6" cy="15" r="3" fill="#fff"/>
                                <circle cx="6" cy="15" r="1.5" fill="#000"/>
                            </g>
                            
                            <!-- 散落的花瓣点缀 -->
                            <path d="M 680 1200 C 695 1185, 710 1190, 700 1205 C 690 1215, 675 1210, 680 1200 Z" fill="#cf4a40" opacity="0.6"/>
                            <path d="M 720 1230 C 730 1220, 745 1225, 735 1240 C 725 1250, 710 1245, 720 1230 Z" fill="#cf4a40" opacity="0.4"/>
                            <path d="M 380 650 C 395 635, 410 640, 400 655 C 390 665, 375 660, 380 650 Z" fill="#cf4a40" opacity="0.5"/>
                            
                            <!-- 边角水墨留白装饰 -->
                            <path d="M 0 0 L 250 0 C 180 80, 80 180, 0 250 Z" fill="#f0ece4" opacity="0.8"/>
                            <path d="M 1080 1920 L 830 1920 C 900 1840, 1000 1740, 1080 1670 Z" fill="#f0ece4" opacity="0.8"/>
                        </svg>
                    </div>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none writing-vertical">
                        <h3 class="text-3xl lg:text-4xl mb-4 font-bold text-gray-800 tracking-[0.2em]">鱼跃龙门</h3>
                        <p class="text-gray-600 tracking-widest text-base lg:text-lg">海阔凭鱼跃<br>天高任鸟飞</p>
                    </div>
                </div>
                <div class="p-4 flex flex-col items-center bg-[#faf9f6] gap-3">
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-[#362923]">太极锦鲤</h2>
                        <p class="text-xs text-gray-500">动态环绕，视觉聚焦</p>
                    </div>
                    <button onclick="copySVG(this)" class="w-full py-2 border border-[#a68a5c] text-[#a68a5c] hover:bg-[#a68a5c] hover:text-white rounded transition-colors duration-200 text-sm">复制代码</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function copySVG(btn) {
            // 获取当前卡片内的 SVG 容器
            const card = btn.closest('.bg-white');
            const svgContainer = card.querySelector('.svg-container');
            
            // 提取纯净的 SVG 代码
            const svgHTML = svgContainer.innerHTML.trim();
            
            // 使用传统方法复制到剪贴板，避免 iframe 限制
            const textarea = document.createElement('textarea');
            textarea.value = svgHTML;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                // 成功反馈
                const originalText = btn.innerHTML;
                btn.innerHTML = '已复制！';
                btn.classList.add('bg-[#8bb3a4]', 'border-[#8bb3a4]', 'text-white');
                btn.classList.remove('text-[#a68a5c]', 'border-[#a68a5c]');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-[#8bb3a4]', 'border-[#8bb3a4]', 'text-white');
                    btn.classList.add('text-[#a68a5c]', 'border-[#a68a5c]');
                }, 2000);
            } catch (err) {
                alert('复制失败，请尝试在浏览器中手动复制。');
            }
            
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
